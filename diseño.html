<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Wear Your Way - Diseñador</title>

    <link rel="stylesheet" href="diseño.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Pacifico&family=Poppins&family=Oswald&display=swap"
        rel="stylesheet">

</head>


<body>

    <div class="top-bar">
        <a href="index.html" class="home-btn">⬅ Inicio</a>
    </div>

    <div class="container">

        <h1>Wear Your Way - Diseña tu playera</h1>

        <div class="editor">

            <div class="preview">

                <div class="shirt">

                    <div class="shirt-color" id="shirtColorLayer"></div>

                    <img src="img/plantilla.jpg" class="shirt-img">

                    <div class="design-area" id="designArea"></div>

                </div>

            </div>

            <div class="controls">

                <h3>Color Playera</h3>

                <div class="color-picker">

                    <div class="color-box" style="background:red" onclick="changeShirtColor('red')"></div>

                    <div class="color-box" style="background:green" onclick="changeShirtColor('green')"></div>

                    <div class="color-box" style="background:black" onclick="changeShirtColor('black')"></div>

                    <div class="color-box" style="background:white" onclick="changeShirtColor('white')"></div>

                    <div class="color-box" style="background:blue" onclick="changeShirtColor('blue')"></div>

                    <div class="color-box" style="background:yellow" onclick="changeShirtColor('yellow')"></div>

                </div>

                <h3>Texto</h3>

                <input type="text" id="textInput" placeholder="Escribe tu texto">

                <select id="fontFamily">
                    <option value="Poppins">Poppins</option>
                    <option value="Anton">Anton</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Oswald">Oswald</option>
                </select>

                <input type="color" id="textColor">

                <button onclick="addText()">Agregar Texto</button>

                <h3>Imagen</h3>

                <input type="file" id="imageUpload" accept="image/*">

                <button onclick="deleteSelected()">Eliminar seleccionado</button>

            </div>

        </div>

    </div>

    <script src="diseño.js"></script>

</body>

</html>
