<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Wear Your Way - Diseñador</title>

    <link rel="stylesheet" href="diseño.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <!-- 🔙 BOTÓN REGRESAR -->
    <div class="top-bar">
        <a href="index.html" class="home-btn">⬅ Inicio</a>
    </div>

    <div class="container">
        <h1>Diseña tu playera</h1>

        <div class="editor">

            <div class="preview">
                <div class="shirt" id="shirt">

                    <!-- PLAYERA -->
                    <img src="img/playera-blanca.png" class="shirt-img" id="shirtBase">

                    <div id="designArea"></div>

                </div>
            </div>

            <div class="controls">

                <h3>Color Playera</h3>
                <div class="color-picker">
                    <div class="color-box" style="background:red" onclick="changeShirtColor('roja')"></div>
                    <div class="color-box" style="background:black" onclick="changeShirtColor('negra')"></div>
                    <div class="color-box" style="background:white; border:1px solid #ccc" onclick="changeShirtColor('blanca')"></div>
                    <div class="color-box" style="background:blue" onclick="changeShirtColor('azul')"></div>
                    <div class="color-box" style="background: green;" onclick="changeShirtColor('verde')"></div>
                </div>

                <h3>Texto</h3>
                <input type="text" id="textInput">
                <input type="color" id="textColor">
                <button onclick="addText()">Agregar Texto</button>

                <h3>Imagen</h3>
                <input type="file" id="imageUpload">

                <button onclick="deleteSelected()">Eliminar seleccionado</button>
                <button onclick="guardarDiseno()">Guardar</button>

            </div>

        </div>
    </div>

    <script src="diseño.js"></script>
</body>

</html>
