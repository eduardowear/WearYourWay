<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Wear Your Way</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- LOGIN -->
    <div class="login-box">

        <div class="logo">👕 Wear Your Way</div>

        <h2>Iniciar Sesión</h2>

        <input id="correo" placeholder="Correo electrónico">
        <input id="pass" type="password" placeholder="Contraseña">

        <button onclick="login()">Entrar</button>

        <div class="create-account">
            ¿No tienes cuenta?
            <a href="#" onclick="openRegister()">Crear usuario</a>
        </div>

    </div>

    <!-- REGISTER -->
    <div id="registerBox" class="register-box">

        <h3>Crear cuenta</h3>

        <input id="nombre" placeholder="Nombre completo">
        <input id="correoReg" placeholder="Correo electrónico">
        <input id="telefono" placeholder="Teléfono">
        <input id="fecha" type="date">

        <input id="newPass" type="password" placeholder="Contraseña">

        <!-- VALIDACIÓN VISUAL -->
        <div class="password-rules">
            <p>La contraseña debe tener:</p>
            <div id="rule-length" class="rule">❌ 12+ caracteres</div>
            <div id="rule-upper" class="rule">❌ Una Mayúscula</div>
            <div id="rule-lower" class="rule">❌ Una Minúscula</div>
            <div id="rule-symbol" class="rule">❌ Un símbolo (!@#$%^&*)</div>
        </div>

        <input id="confirmPass" type="password" placeholder="Confirmar contraseña">

        <button onclick="createUser()">Crear cuenta</button>
        <button onclick="closeRegister()">Cancelar</button>

    </div>

    <script src="login.js"></script>

    <script>

        function openRegister() {
            document.getElementById("registerBox").style.display = "block";
        }

        function closeRegister() {
            document.getElementById("registerBox").style.display = "none";
        }

        // VALIDACIÓN EN TIEMPO REAL
        const passwordInput = document.getElementById("newPass");

        passwordInput.addEventListener("input", function () {

            const value = passwordInput.value;

            const hasLength = value.length >= 12;
            const hasUpper = /[A-Z]/.test(value);
            const hasLower = /[a-z]/.test(value);
            const hasSymbol = /[\W_]/.test(value);

            updateRule("rule-length", hasLength);
            updateRule("rule-upper", hasUpper);
            updateRule("rule-lower", hasLower);
            updateRule("rule-symbol", hasSymbol);

        });

        function updateRule(id, valid) {

            const element = document.getElementById(id);

            if (valid) {
                element.innerHTML = "✅ " + element.innerText.substring(2);
                element.style.color = "green";
            } else {
                element.innerHTML = "❌ " + element.innerText.substring(2);
                element.style.color = "red";
            }
        }

        // REGISTRO
        async function createUser() {

            let nombre = document.getElementById("nombre").value;
            let correo = document.getElementById("correoReg").value;
            let telefono = document.getElementById("telefono").value;
            let fecha = document.getElementById("fecha").value;
            let password = document.getElementById("newPass").value;
            let confirm = document.getElementById("confirmPass").value;

            if (!nombre || !correo || !telefono || !fecha || !password || !confirm) {
                alert("Completa todos los campos");
                return;
            }

            if (password !== confirm) {
                alert("Las contraseñas no coinciden");
                return;
            }

            // VALIDACIÓN FINAL
            const regex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[\W_]).{12,}$/;

            if (!regex.test(password)) {
                alert("La contraseña no cumple los requisitos");
                return;
            }

            let res = await fetch("http://localhost:3000/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nombre,
                    correo,
                    telefono,
                    fechaNacimiento: fecha,
                    password
                })
            });

            let data = await res.json();

            if (data.success) {
                alert("Usuario creado correctamente");
                closeRegister();
            } else {
                alert("Error al crear usuario");
            }
        }

    </script>

</body>

</html>
