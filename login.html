<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Wear Your Way</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-box">
        <div class="logo">Wear Your Way</div>
        <h2>Iniciar Sesión</h2>

        <input type="text" id="correo" placeholder="Correo o usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
        <p id="errorMsg"></p>

        <div class="create-account">
            ¿No tienes cuenta?
            <a href="javascript:void(0)" onclick="mostrarRegistro()">Crear usuario</a>
        </div>
    </div>

    <!-- REGISTRO -->
    <div id="registerBox" class="register-box">

        <h3>Crear cuenta</h3>

        <input id="nombre" placeholder="Nombre completo">
        <input id="correoReg" placeholder="Correo electrónico">
        <input id="telefono" placeholder="Teléfono">
        <input id="fecha" type="date">
        <input id="newPass" type="password" placeholder="Contraseña">

        <!-- 🔥 REGLAS -->
        <div class="password-rules">
            <p>La contraseña debe tener:</p>
            <div id="rule-length" class="rule">X 12+ caracteres</div>
            <div id="rule-upper" class="rule">X Una mayúscula</div>
            <div id="rule-lower" class="rule">X Una minúscula</div>
            <div id="rule-symbol" class="rule">X Un símbolo (!@#$%)</div>
        </div>

        <input id="confirmPass" type="password" placeholder="Confirmar contraseña">

        <button onclick="register()">Crear cuenta</button>
        <button onclick="closeRegister()">Cancelar</button>

    </div>

    <script src="login.js"></script>
</body>

</html>
