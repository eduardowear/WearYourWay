<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Confirmación de Pago</title>
  <link rel="stylesheet" href="checkout.css">
</head>

<body>
  <div class="checkout-box">
    <h2>Confirmación de pago</h2>
    <div class="folio">Folio: <span id="folio"></span></div>

    <div class="section">
      <h3>Datos del cliente</h3>
      <p><strong>Nombre:</strong> <span id="cliente"></span></p>
      <p><strong>Correo:</strong> <span id="correo"></span></p>
      <p><strong>Dirección:</strong> <span id="direccion"></span></p>
    </div>

    <div class="section">
      <h3>Pago y envío</h3>
      <p><strong>Método:</strong> <span id="metodo"></span></p>
      <p><strong>Fecha:</strong> <span id="fecha"></span></p>
      <p><strong>Estado:</strong> Pago confirmado</p>
    </div>

    <div class="section">
      <h3>Productos</h3>
      <p><span id="producto"></span> · Cantidad <span id="cantidad"></span></p>
      <p><strong>Precio:</strong> $<span id="precioProductos"></span></p>
    </div>

    <div class="section resumen">
      <h3>Resumen</h3>
      <p>Subtotal: $<span id="subtotal"></span></p>
      <p>Envío: $<span id="envio"></span></p>
      <p><strong>Total pagado:</strong> $<span id="total"></span></p>
    </div>


    <div class="buttons">
      <button onclick="window.print()">Imprimir</button>
      <button onclick="window.location.href='index.html'">Cerrar</button>
    </div>
  </div>




  <script src="checkout.js"></script>
</body>

</html>
